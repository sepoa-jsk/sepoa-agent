<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>세포아 블로그 콘솔</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root {
    --primary: #0747A6;
    --primary-weak: #E8EFF9;
    --dark: #0F172A;
    --line: #E2E8F0;
    --ink: #1E293B;
    --muted: #64748B;
    --bg: #F8FAFC;
    --ok: #15803D;
    --stop: #B45309;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: Pretendard, "Noto Sans KR", system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.6;
  }
  header {
    background: var(--dark);
    color: #fff;
    padding: 18px 28px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  header .dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--primary);
    box-shadow: 0 0 0 4px rgba(7,71,166,.25);
  }
  header h1 { font-size: 16px; font-weight: 700; margin: 0; letter-spacing: -.2px; }
  header span { font-size: 12px; color: #94A3B8; margin-left: auto; }

  .wrap { max-width: 860px; margin: 0 auto; padding: 28px 20px 80px; }

  /* 진입 선택 */
  .entry {
    display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 8px;
  }
  .card {
    background: #fff; border: 1px solid var(--line); border-radius: 12px;
    padding: 20px; cursor: pointer; transition: border-color .15s, box-shadow .15s;
  }
  .card:hover { border-color: var(--primary); box-shadow: 0 4px 16px rgba(7,71,166,.08); }
  .card.active { border-color: var(--primary); background: var(--primary-weak); }
  .card h3 { margin: 0 0 6px; font-size: 15px; }
  .card p { margin: 0; font-size: 13px; color: var(--muted); }

  .panel {
    background: #fff; border: 1px solid var(--line); border-radius: 12px;
    padding: 22px; margin-top: 16px;
  }
  .panel.hidden { display: none; }

  /* 업로드 존 */
  .drop {
    border: 1.5px dashed #CBD5E1; border-radius: 10px; padding: 32px;
    text-align: center; color: var(--muted); cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .drop.over { border-color: var(--primary); background: var(--primary-weak); }
  .drop strong { color: var(--primary); }
  .fileline { margin-top: 12px; font-size: 13px; color: var(--ink); display: none; }
  .fileline.show { display: block; }

  textarea {
    width: 100%; min-height: 76px; border: 1px solid var(--line);
    border-radius: 8px; padding: 12px; font: inherit; resize: vertical;
  }
  textarea:focus { outline: 2px solid var(--primary); border-color: transparent; }

  .btn {
    appearance: none; border: 0; border-radius: 8px; padding: 11px 18px;
    font: inherit; font-weight: 600; cursor: pointer; transition: opacity .15s;
  }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-ghost { background: #fff; color: var(--primary); border: 1px solid var(--primary); }
  .row { display: flex; gap: 10px; align-items: center; margin-top: 14px; flex-wrap: wrap; }

  /* 진행 단계 표시 */
  .steps { display: flex; gap: 6px; margin: 20px 0 4px; font-size: 12px; }
  .steps .s {
    flex: 1; text-align: center; padding: 8px 4px; border-radius: 6px;
    background: #F1F5F9; color: var(--muted);
  }
  .steps .s.done { background: #DCFCE7; color: var(--ok); }
  .steps .s.now { background: var(--primary); color: #fff; }

  /* 결과 출력 — 마크다운 렌더링 카드 (가독성 우선, 밝은 배경) */
  .out {
    margin-top: 16px; background: #fff; color: var(--ink);
    border: 1px solid var(--line); border-left: 4px solid var(--primary);
    border-radius: 10px; padding: 20px 24px; font-size: 14.5px;
    word-break: break-word; line-height: 1.75;
    max-height: 560px; overflow: auto;
  }
  .out > :first-child { margin-top: 0; }
  .out > :last-child { margin-bottom: 0; }
  .out h1, .out h2, .out h3, .out h4 {
    color: var(--dark); font-weight: 700; line-height: 1.35; margin: 22px 0 10px;
  }
  .out h1 { font-size: 21px; border-bottom: 2px solid var(--primary-weak); padding-bottom: 7px; }
  .out h2 { font-size: 17.5px; }
  .out h3 { font-size: 15.5px; }
  .out h4 { font-size: 14.5px; color: var(--primary); }
  .out p { margin: 10px 0; }
  .out strong { font-weight: 700; color: var(--dark); }
  .out em { font-style: italic; color: var(--muted); }
  .out ul, .out ol { margin: 10px 0; padding-left: 22px; }
  .out li { margin: 5px 0; }
  .out li::marker { color: var(--primary); font-weight: 700; }
  .out blockquote {
    margin: 12px 0; padding: 12px 16px;
    background: var(--primary-weak); border-left: 4px solid var(--primary);
    border-radius: 0 8px 8px 0; color: var(--dark);
  }
  .out blockquote p { margin: 5px 0; }
  .out hr { border: 0; border-top: 1px solid var(--line); margin: 20px 0; }
  .out code {
    background: #F1F5F9; color: #B91C1C; padding: 1px 6px;
    border-radius: 4px; font-size: .9em;
    font-family: ui-monospace, "SFMono-Regular", Consolas, monospace;
  }
  .out pre {
    background: var(--dark); color: #E2E8F0; padding: 14px 16px;
    border-radius: 8px; overflow: auto;
  }
  .out pre code { background: none; color: inherit; padding: 0; }
  .out a { color: var(--primary); }
  .out table { border-collapse: collapse; margin: 12px 0; width: 100%; font-size: 13.5px; }
  .out th, .out td { border: 1px solid var(--line); padding: 6px 10px; text-align: left; }
  .out th { background: var(--primary-weak); color: var(--dark); }
  /* [STOP] 문구·제목 번호 강조 */
  .out .hl {
    background: #FEF3C7; color: var(--stop); font-weight: 700;
    padding: 0 5px; border-radius: 4px;
  }
  .stopbar {
    margin-top: 14px; padding: 12px 16px; border-radius: 8px;
    background: #FEF3C7; color: var(--stop); font-size: 13px; font-weight: 600;
    display: flex; align-items: center; gap: 8px;
  }
  /* 작업중 배너 */
  .working {
    display: none; align-items: center; gap: 14px;
    margin-top: 16px; padding: 16px 18px; border-radius: 10px;
    background: var(--primary-weak); border: 1px solid var(--primary);
    animation: workpulse 2s ease-in-out infinite;
  }
  .working.show { display: flex; }
  .working .spinner {
    width: 22px; height: 22px; flex: none;
    border: 3px solid rgba(7,71,166,.2); border-top-color: var(--primary);
    border-radius: 50%; animation: spin .8s linear infinite;
  }
  .working .wtext { flex: 1; }
  .working .wtext strong { color: var(--primary); font-size: 14px; display: block; }
  .working .wtext small { color: var(--muted); font-size: 12px; }
  .working .elapsed {
    font-variant-numeric: tabular-nums; font-weight: 700; font-size: 15px;
    color: var(--primary); min-width: 56px; text-align: right;
  }
  .btn-stop { background: #fff; color: #B91C1C; border: 1px solid #FCA5A5; padding: 8px 14px; }
  .btn-stop:hover { background: #FEF2F2; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes workpulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(7,71,166,.18); }
    50% { box-shadow: 0 0 0 6px rgba(7,71,166,.06); }
  }

  /* 사용량 표시 */
  .meta {
    display: none; margin-top: 10px; padding: 12px 16px; border-radius: 8px;
    background: #F1F5F9; border: 1px solid var(--line);
    font-size: 12.5px; color: var(--muted); line-height: 1.8;
  }
  .meta.show { display: block; }
  .meta b { color: var(--ink); font-weight: 600; font-variant-numeric: tabular-nums; }
  .meta .mrow { display: flex; flex-wrap: wrap; gap: 4px 18px; }
  .meta .mlabel { color: var(--primary); font-weight: 700; margin-right: 2px; }
  .err { color: #B91C1C; font-size: 13px; margin-top: 12px; }

  .titlepick { display: flex; gap: 8px; margin-top: 14px; }
  .titlepick button {
    flex: 1; padding: 10px; border: 1px solid var(--line); background: #fff;
    border-radius: 8px; cursor: pointer; font: inherit; font-weight: 600;
  }
  .titlepick button:hover { border-color: var(--primary); color: var(--primary); }

  /* 모델 선택 */
  .modelpick { margin-top: 14px; }
  .modelpick-label {
    font-size: 13px; font-weight: 700; color: var(--dark); margin-bottom: 8px;
  }
  .modelpick-locked { margin-left: 8px; font-size: 12px; font-weight: 500; color: var(--muted); }
  .modelpick-options {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
  }
  @media (max-width: 620px) {
    .modelpick-options { grid-template-columns: repeat(2, 1fr); }
  }
  .modelopt {
    display: flex; flex-direction: column; align-items: flex-start; gap: 4px;
    text-align: left; background: #fff; border: 1.5px solid var(--line);
    border-radius: 10px; padding: 10px 12px; cursor: pointer; font: inherit;
    transition: border-color .15s, background .15s;
  }
  .modelopt:hover:not(:disabled) { border-color: var(--primary); }
  .modelopt.active { border-color: var(--primary); background: var(--primary-weak); }
  .modelopt.active .mopt-name { color: var(--primary); }
  .modelopt:disabled { opacity: .55; cursor: not-allowed; }
  .mopt-name { font-weight: 700; font-size: 13.5px; color: var(--ink); }
  .mopt-desc { font-size: 11.5px; color: var(--muted); line-height: 1.4; }
  .mopt-warn { font-size: 10.5px; color: var(--stop); font-weight: 600; }

  /* Fable 실패 안내 */
  .errhint {
    margin-top: 8px; padding: 10px 14px; border-radius: 8px;
    background: #FEF3C7; color: var(--stop); font-size: 12.5px; font-weight: 600;
    display: none;
  }
</style>
</head>
<body>
<header>
  <div class="dot"></div>
  <h1>세포아 블로그 콘솔</h1>
  <span>blog.naver.com/sepoa0127</span>
</header>

<div class="wrap">
  <!-- 진입 방식 선택 -->
  <div class="entry">
    <div class="card" id="cardA" onclick="chooseEntry('A')">
      <h3>워드 초안 올리기</h3>
      <p>작성해 둔 .docx를 올리면 읽고 제목을 추천합니다.</p>
    </div>
    <div class="card" id="cardB" onclick="chooseEntry('B')">
      <h3>주제만 입력하기</h3>
      <p>"OO 주제로 써줘" 한 줄이면 시작합니다.</p>
    </div>
  </div>

  <!-- 모델 선택 -->
  <div class="modelpick" id="modelpick">
    <div class="modelpick-label">
      Claude 모델 선택
      <span class="modelpick-locked" id="modelLockedInfo" style="display:none"></span>
    </div>
    <div class="modelpick-options">
      <button type="button" class="modelopt active" data-model="sonnet" onclick="selectModel('sonnet')">
        <span class="mopt-name">Sonnet</span>
        <span class="mopt-desc">균형 (기본 추천)</span>
      </button>
      <button type="button" class="modelopt" data-model="opus" onclick="selectModel('opus')">
        <span class="mopt-name">Opus</span>
        <span class="mopt-desc">고품질, 느림</span>
      </button>
      <button type="button" class="modelopt" data-model="haiku" onclick="selectModel('haiku')">
        <span class="mopt-name">Haiku</span>
        <span class="mopt-desc">빠르고 저렴, 간단한 작업</span>
      </button>
      <button type="button" class="modelopt" data-model="fable" onclick="selectModel('fable')">
        <span class="mopt-name">Fable</span>
        <span class="mopt-desc">최고 성능, 크레딧 필요할 수 있음 (중요한 글에)</span>
        <span class="mopt-warn">⚠ 크레딧/플랜에 따라 사용 불가할 수 있음</span>
      </button>
    </div>
  </div>

  <!-- 입구 A: 업로드 -->
  <div class="panel hidden" id="panelA">
    <div class="drop" id="drop">
      <p><strong>클릭</strong> 또는 파일을 여기로 끌어다 놓기 (.docx)</p>
      <div class="fileline" id="fileline"></div>
    </div>
    <input type="file" id="fileInput" accept=".docx,.doc" hidden />
    <div class="row">
      <button class="btn btn-primary" id="startAbtn" disabled onclick="startFromDocx()">읽고 제목 추천받기</button>
    </div>
  </div>

  <!-- 입구 B: 주제 입력 -->
  <div class="panel hidden" id="panelB">
    <textarea id="topic" placeholder="예) 전자계약 도입 효과를 리스크 관리 관점에서 써줘"></textarea>
    <div class="row">
      <button class="btn btn-primary" onclick="startFromTopic()">주제로 시작하기</button>
    </div>
  </div>

  <!-- 진행/결과 영역 -->
  <div class="panel hidden" id="work">
    <div class="steps" id="stepbar">
      <div class="s" data-k="title">제목 선택</div>
      <div class="s" data-k="keyword">키워드 승인</div>
      <div class="s" data-k="body">본문·이미지</div>
      <div class="s" data-k="verify">검증</div>
    </div>

    <div class="working" id="working">
      <div class="spinner"></div>
      <div class="wtext">
        <strong>작업 중입니다…</strong>
        <small>Claude Code 하네스가 실행되고 있습니다. 단계에 따라 수 분이 걸릴 수 있습니다.</small>
      </div>
      <div class="elapsed" id="elapsed">0초</div>
      <button class="btn btn-stop" onclick="stopRun()">중지</button>
    </div>
    <div class="err" id="err"></div>
    <div class="errhint" id="errHint"></div>
    <div class="out" id="out" style="display:none"></div>
    <div class="meta" id="meta"></div>

    <!-- 제목 선택 버튼 (STOP1) -->
    <div class="titlepick" id="titlepick" style="display:none">
      <button onclick="pickTitle(1)">1번</button>
      <button onclick="pickTitle(2)">2번</button>
      <button onclick="pickTitle(3)">3번</button>
    </div>

    <!-- STOP 승인 바 -->
    <div class="stopbar" id="stopbar" style="display:none">
      <span id="stoptext"></span>
    </div>
    <div class="row" id="stopactions" style="display:none">
      <button class="btn btn-primary" id="approveBtn"></button>
      <button class="btn btn-ghost" id="reviseBtn" onclick="toggleRevise()">다시 만들기</button>
    </div>

    <!-- 수정 요청 입력 (다시 만들기) -->
    <div id="reviseBox" style="display:none; margin-top:12px">
      <textarea id="reviseText" placeholder="어떻게 고칠지 적어주세요. 예) 제목을 더 짧고 질문형으로"></textarea>
      <div class="row">
        <button class="btn btn-primary" onclick="sendRevise()">수정 요청 보내기</button>
        <button class="btn btn-ghost" onclick="hideReviseBox()">취소</button>
      </div>
    </div>
  </div>
</div>

<script>
  // 브라우저 탭마다 고유 키 → 서버가 Claude 세션을 이어가는 데 사용
  const browserKey = "bk_" + Math.random().toString(36).slice(2);
  let entry = null;        // 'A' | 'B'
  let uploaded = false;

  const $ = (id) => document.getElementById(id);

  // ── 모델 선택 (시작 전에만 변경 가능) ────────────
  const MODEL_LABELS = { sonnet: "Sonnet", opus: "Opus", haiku: "Haiku", fable: "Fable" };
  let selectedModel = "sonnet"; // 기본값
  let modelLocked = false;

  function selectModel(m) {
    if (modelLocked) return;
    selectedModel = m;
    document.querySelectorAll(".modelopt").forEach((b) => {
      b.classList.toggle("active", b.dataset.model === m);
    });
  }

  // 작업이 실제로 시작된 뒤에는 모델을 바꿀 수 없게 잠그고, 고른 모델만 표시한다.
  function lockModelSelection(model) {
    modelLocked = true;
    document.querySelectorAll(".modelopt").forEach((b) => (b.disabled = true));
    const info = $("modelLockedInfo");
    info.textContent = "— 현재 모델: " + (MODEL_LABELS[model] || model) + " (변경 불가)";
    info.style.display = "inline";
  }

  // marked 옵션: 단일 줄바꿈도 <br>로, GitHub 스타일 마크다운 사용.
  // mangle/headerIds 끔 — 이메일 난독화·헤더 자동 id 생성 불필요.
  if (window.marked) {
    marked.setOptions({ breaks: true, gfm: true, mangle: false, headerIds: false });
  }

  // 결과 텍스트를 마크다운으로 렌더링해 결과 카드에 표시
  function renderResult(text) {
    const out = $("out");
    out.style.display = "block";
    if (window.marked) {
      out.innerHTML = marked.parse(text || "");
      sanitize(out);          // 혹시 섞여 온 스크립트/이벤트 핸들러 제거
      highlightKeywords(out);
    } else {
      // marked 로드 실패 시 원본 텍스트로 폴백
      out.style.whiteSpace = "pre-wrap";
      out.textContent = text || "";
    }
  }

  // 결과는 신뢰된 자체 백엔드에서만 오므로 기본 설정으로 렌더링하되,
  // 혹시 스크립트 태그·이벤트 핸들러 같은 게 섞여 오면 무시되게 최소 정리.
  function sanitize(root) {
    // 실행·삽입 위험이 있는 요소 제거
    root.querySelectorAll("script, style, iframe, object, embed, link, meta, base")
      .forEach((el) => el.remove());
    // on* 이벤트 핸들러 속성, javascript: URL 제거 (예: <img onerror=...>)
    root.querySelectorAll("*").forEach((el) => {
      [...el.attributes].forEach((attr) => {
        const name = attr.name.toLowerCase();
        const val = (attr.value || "").replace(/\s+/g, "").toLowerCase();
        if (name.startsWith("on") || val.startsWith("javascript:")) {
          el.removeAttribute(attr.name);
        }
      });
    });
  }

  // [STOP] 문구와 제목 번호(1안/2번 등)를 눈에 띄게 강조
  function highlightKeywords(root) {
    const rx = /(\[STOP[^\]]*\]|STOP ?\d*|제?\d+ ?(?:안|번))/g;
    const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, null);
    const targets = [];
    let node;
    while ((node = walker.nextNode())) {
      const p = node.parentNode;
      if (p && p.classList && p.classList.contains("hl")) continue;
      rx.lastIndex = 0;
      if (rx.test(node.nodeValue)) targets.push(node);
    }
    targets.forEach((textNode) => {
      const s = textNode.nodeValue;
      const frag = document.createDocumentFragment();
      let last = 0;
      rx.lastIndex = 0;
      let m;
      while ((m = rx.exec(s)) !== null) {
        if (m.index > last) frag.appendChild(document.createTextNode(s.slice(last, m.index)));
        const mark = document.createElement("span");
        mark.className = "hl";
        mark.textContent = m[0];
        frag.appendChild(mark);
        last = m.index + m[0].length;
      }
      if (last < s.length) frag.appendChild(document.createTextNode(s.slice(last)));
      textNode.parentNode.replaceChild(frag, textNode);
    });
  }

  function chooseEntry(k) {
    entry = k;
    $("cardA").classList.toggle("active", k === "A");
    $("cardB").classList.toggle("active", k === "B");
    $("panelA").classList.toggle("hidden", k !== "A");
    $("panelB").classList.toggle("hidden", k !== "B");
  }

  // ── 업로드 처리 ──────────────────────────────
  const drop = $("drop"), fileInput = $("fileInput");
  drop.onclick = () => fileInput.click();
  drop.ondragover = (e) => { e.preventDefault(); drop.classList.add("over"); };
  drop.ondragleave = () => drop.classList.remove("over");
  drop.ondrop = (e) => {
    e.preventDefault(); drop.classList.remove("over");
    if (e.dataTransfer.files[0]) uploadFile(e.dataTransfer.files[0]);
  };
  fileInput.onchange = () => { if (fileInput.files[0]) uploadFile(fileInput.files[0]); };

  async function uploadFile(file) {
    const fd = new FormData();
    fd.append("draft", file);
    $("fileline").textContent = "업로드 중… " + file.name;
    $("fileline").classList.add("show");
    try {
      const r = await fetch("/api/upload", { method: "POST", body: fd });
      const j = await r.json();
      if (!j.ok) throw new Error(j.error || "업로드 실패");
      $("fileline").textContent = "올림: " + j.filename;
      uploaded = true;
      $("startAbtn").disabled = false;
    } catch (e) {
      $("fileline").textContent = "실패: " + e.message;
    }
  }

  // ── 작업중 표시 (경과 시간 카운트) ────────────
  let running = false;
  let elapsedTimer = null;

  function showWorking() {
    running = true;
    const startedAt = Date.now();
    $("elapsed").textContent = "0초";
    $("working").classList.add("show");
    document.querySelectorAll(".btn-primary, .titlepick button, .modelopt").forEach((b) => (b.disabled = true));
    elapsedTimer = setInterval(() => {
      const s = Math.floor((Date.now() - startedAt) / 1000);
      $("elapsed").textContent =
        s < 60 ? s + "초" : Math.floor(s / 60) + "분 " + (s % 60) + "초";
    }, 1000);
  }

  function hideWorking() {
    running = false;
    clearInterval(elapsedTimer);
    $("working").classList.remove("show");
    document.querySelectorAll(".btn-primary, .titlepick button").forEach((b) => (b.disabled = false));
    document.querySelectorAll(".modelopt").forEach((b) => (b.disabled = modelLocked));
    $("startAbtn").disabled = !uploaded; // 업로드 전이면 다시 잠금
  }

  async function stopRun() {
    try {
      await fetch("/api/stop", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ browserKey }),
      });
    } catch {}
  }

  // ── 사용량 표시 (결과 도출 이후) ──────────────
  const totals = { costUsd: 0, inTok: 0, outTok: 0, cacheTok: 0, ms: 0 };

  const fmtNum = (n) => (n == null ? "-" : Number(n).toLocaleString("ko-KR"));
  const fmtDur = (ms) => {
    if (ms == null) return "-";
    const s = Math.round(ms / 1000);
    return s < 60 ? s + "초" : Math.floor(s / 60) + "분 " + (s % 60) + "초";
  };
  const fmtUsd = (c) => (c == null ? "-" : "$" + Number(c).toFixed(4));

  function renderMeta(meta) {
    if (!meta) { $("meta").classList.remove("show"); return; }
    const u = meta.usage || {};
    const inTok = u.input_tokens ?? null;
    const outTok = u.output_tokens ?? null;
    const cacheTok =
      (u.cache_read_input_tokens ?? 0) + (u.cache_creation_input_tokens ?? 0);

    totals.ms += meta.durationMs ?? 0;
    totals.costUsd += meta.costUsd ?? 0;
    totals.inTok += inTok ?? 0;
    totals.outTok += outTok ?? 0;
    totals.cacheTok += cacheTok;

    $("meta").innerHTML =
      '<div class="mrow"><span class="mlabel">이번 단계</span>' +
      "<span>소요 <b>" + fmtDur(meta.durationMs) + "</b></span>" +
      "<span>턴 <b>" + fmtNum(meta.numTurns) + "</b></span>" +
      "<span>입력 <b>" + fmtNum(inTok) + "</b> 토큰</span>" +
      "<span>출력 <b>" + fmtNum(outTok) + "</b> 토큰</span>" +
      "<span>캐시 <b>" + fmtNum(cacheTok) + "</b> 토큰</span>" +
      "<span>비용 <b>" + fmtUsd(meta.costUsd) + "</b></span></div>" +
      '<div class="mrow"><span class="mlabel">세션 누적</span>' +
      "<span>소요 <b>" + fmtDur(totals.ms) + "</b></span>" +
      "<span>입력 <b>" + fmtNum(totals.inTok) + "</b> 토큰</span>" +
      "<span>출력 <b>" + fmtNum(totals.outTok) + "</b> 토큰</span>" +
      "<span>캐시 <b>" + fmtNum(totals.cacheTok) + "</b> 토큰</span>" +
      "<span>비용 <b>" + fmtUsd(totals.costUsd) + "</b></span></div>";
    $("meta").classList.add("show");
  }

  // ── 단계 실행 공통 ───────────────────────────
  async function runStep(payload) {
    if (running) return;
    $("work").classList.remove("hidden");
    showWorking();
    $("err").textContent = "";
    $("errHint").style.display = "none";
    $("meta").classList.remove("show");
    $("titlepick").style.display = "none";
    $("stopbar").style.display = "none";
    $("stopactions").style.display = "none";
    $("reviseBox").style.display = "none";
    try {
      const r = await fetch("/api/step", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ browserKey, ...payload }),
      });
      const j = await r.json();
      hideWorking();
      if (!j.ok) throw new Error(j.error || "실행 실패");
      renderResult(j.text);
      renderMeta(j.meta);
      return j.text;
    } catch (e) {
      hideWorking();
      $("err").textContent = "오류: " + e.message;
      throw e;
    }
  }

  function markStep(kEl, cls) {
    document.querySelectorAll(".steps .s").forEach((s) => {
      if (s.dataset.k === kEl) { s.className = "s " + cls; }
    });
  }

  // ── STOP 화면 공통 표시 ──────────────────────
  // currentStop: 'title' | 'keyword' | 'images' | null
  // 다시 만들기(revise) 후 같은 STOP 화면을 복원하는 데 사용한다.
  let currentStop = null;

  function showStop(stage) {
    currentStop = stage;
    hideReviseBox();
    $("stopbar").style.display = "flex";
    $("stopactions").style.display = "flex";
    $("titlepick").style.display = stage === "title" ? "flex" : "none";
    if (stage === "title") {
      $("stoptext").textContent = "STOP 1 — 제목 3안 중 하나를 고르세요.";
      $("approveBtn").style.display = "none";
    } else if (stage === "keyword") {
      $("stoptext").textContent = "STOP 2 — 키워드 배치안을 확인하고 승인하세요.";
      $("approveBtn").style.display = "";
      $("approveBtn").textContent = "키워드 승인하고 본문 작성";
      $("approveBtn").onclick = approveKeywords;
    } else {
      $("stoptext").textContent = "STOP 3 — 이미지 내 텍스트를 확인하고 승인하세요.";
      $("approveBtn").style.display = "";
      $("approveBtn").textContent = "이미지 승인하고 최종 검증";
      $("approveBtn").onclick = approveImages;
    }
  }

  // ── 다시 만들기 (revise) ─────────────────────
  function toggleRevise() {
    const box = $("reviseBox");
    const opening = box.style.display === "none";
    box.style.display = opening ? "block" : "none";
    if (opening) $("reviseText").focus();
  }

  function hideReviseBox() {
    $("reviseBox").style.display = "none";
  }

  async function sendRevise() {
    const feedback = $("reviseText").value.trim();
    if (!feedback) { $("reviseText").focus(); return; }
    const stage = currentStop;
    try {
      await runStep({ step: "revise", feedback });
      $("reviseText").value = "";
    } finally {
      // 성공이든 실패든 같은 STOP 화면을 복원한다 (실패 시 오류 문구는 유지됨)
      showStop(stage);
    }
  }

  // ── 입구 A 시작 ─────────────────────────────
  async function startFromDocx() {
    if (!uploaded) return;
    const usedModel = selectedModel;
    markStep("title", "now");
    try {
      await runStep({ step: "start_from_docx", model: usedModel });
      lockModelSelection(usedModel);
      showStop("title");
    } catch (e) {
      markStep("title", "");
      showModelFailureHint(usedModel);
    }
  }

  // ── 입구 B 시작 ─────────────────────────────
  async function startFromTopic() {
    const topic = $("topic").value.trim();
    if (!topic) { $("topic").focus(); return; }
    const usedModel = selectedModel;
    markStep("title", "now");
    try {
      await runStep({ step: "start_from_topic", topic, model: usedModel });
      lockModelSelection(usedModel);
      showStop("title");
    } catch (e) {
      markStep("title", "");
      showModelFailureHint(usedModel);
    }
  }

  // 시작 단계가 실패했을 때, 특히 Fable 사용 시 크레딧/플랜 문제일 수 있음을 안내.
  // 모델 선택은 아직 잠기지 않았으므로(성공해야 잠김) 바로 다른 모델로 재시도할 수 있다.
  function showModelFailureHint(usedModel) {
    if (usedModel !== "fable") return;
    const hint = $("errHint");
    hint.textContent = "Fable 사용 불가 — 다른 모델을 선택하세요.";
    hint.style.display = "block";
  }

  // ── STOP1: 제목 선택 → 키워드 ────────────────
  async function pickTitle(n) {
    markStep("title", "done");
    markStep("keyword", "now");
    await runStep({ step: "pick_title", choice: n });
    showStop("keyword");
  }

  // ── STOP2: 키워드 승인 → 본문+이미지 ─────────
  async function approveKeywords() {
    markStep("keyword", "done");
    markStep("body", "now");
    await runStep({ step: "approve_keywords" });
    showStop("images");
  }

  // ── STOP3: 이미지 승인 → 검증 ───────────────
  async function approveImages() {
    markStep("body", "done");
    markStep("verify", "now");
    await runStep({ step: "approve_images" });
    markStep("verify", "done");
    currentStop = null;
    $("stopbar").style.display = "flex";
    $("stoptext").textContent = "검증 완료. 발행은 네이버에서 직접 하세요 (자동 발행 안 함).";
    $("stopactions").style.display = "none";
  }
</script>
</body>
</html>
