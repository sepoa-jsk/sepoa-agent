<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" font-family="Pretendard, 'Noto Sans KR', sans-serif">
  <rect width="1280" height="720" fill="#0F172A"/>

  <!-- 회로기판 모티프 -->
  <g stroke="#0747A6" stroke-width="2" fill="none" opacity="0.2">
    <path d="M0 80 H160 V30"/><path d="M1280 90 H1120 V40"/>
    <path d="M60 720 V620 H240"/><path d="M1220 720 V640 H1040"/>
  </g>
  <g fill="#0747A6" opacity="0.32">
    <circle cx="160" cy="30" r="5"/><circle cx="1120" cy="40" r="5"/>
    <circle cx="240" cy="620" r="5"/><circle cx="1040" cy="640" r="5"/>
  </g>

  <!-- 제목 -->
  <text x="640" y="130" text-anchor="middle" fill="#F8FAFC" font-size="46" font-weight="800">원가 이탈을 '사후'에 발견하는 구조</text>
  <rect x="520" y="158" width="240" height="5" rx="2.5" fill="#0747A6"/>

  <!-- 3개 문제 카드 -->
  <g>
    <!-- 카드1: 전파 경로 안 보임 -->
    <rect x="110" y="250" width="320" height="320" rx="18" fill="#0B1220" stroke="#0747A6" stroke-width="2"/>
    <g transform="translate(270,335)" stroke="#0747A6" stroke-width="5" fill="none" stroke-linecap="round">
      <circle cx="0" cy="-20" r="14"/>
      <path d="M0 -6 V20 M0 20 L-40 55 M0 20 L0 55 M0 20 L40 55"/>
      <circle cx="-40" cy="62" r="8" fill="#0F172A"/><circle cx="0" cy="62" r="8" fill="#0F172A"/><circle cx="40" cy="62" r="8" fill="#0F172A"/>
    </g>
    <text x="270" y="500" text-anchor="middle" fill="#F1F5F9" font-size="30" font-weight="700">전파 경로 안 보임</text>
    <text x="270" y="540" text-anchor="middle" fill="#94A3B8" font-size="19">BOM 계층을 수작업 추적</text>

    <!-- 카드2: 목표원가 사후 확인 -->
    <rect x="480" y="250" width="320" height="320" rx="18" fill="#0B1220" stroke="#0747A6" stroke-width="2"/>
    <g transform="translate(640,340)" stroke="#0747A6" stroke-width="5" fill="none" stroke-linecap="round">
      <circle cx="0" cy="0" r="42"/>
      <path d="M0 0 V-26 M0 0 L20 12"/>
      <path d="M40 -40 l14 -8 M-40 -40 l-14 -8" opacity="0.7"/>
    </g>
    <text x="640" y="500" text-anchor="middle" fill="#F1F5F9" font-size="30" font-weight="700">목표원가 사후 확인</text>
    <text x="640" y="540" text-anchor="middle" fill="#94A3B8" font-size="19">마감 후에야 이탈 인지</text>

    <!-- 카드3: 단가·시세 흩어짐 -->
    <rect x="850" y="250" width="320" height="320" rx="18" fill="#0B1220" stroke="#0747A6" stroke-width="2"/>
    <g transform="translate(1010,330)" stroke="#0747A6" stroke-width="4" fill="none">
      <rect x="-52" y="-30" width="54" height="66" rx="6" transform="rotate(-10 -25 3)"/>
      <rect x="4" y="-22" width="54" height="66" rx="6" transform="rotate(8 31 11)"/>
      <rect x="-24" y="-4" width="54" height="66" rx="6" transform="rotate(-2 3 29)" fill="#0F172A"/>
    </g>
    <text x="1010" y="500" text-anchor="middle" fill="#F1F5F9" font-size="30" font-weight="700">단가·시세 흩어짐</text>
    <text x="1010" y="540" text-anchor="middle" fill="#94A3B8" font-size="19">메일·엑셀에 분산</text>
  </g>

  <text x="640" y="650" text-anchor="middle" fill="#64748B" font-size="22" font-weight="600">→ 리스크를 '개별 단가' 단위로만 쫓는 구조의 한계</text>
</svg>
