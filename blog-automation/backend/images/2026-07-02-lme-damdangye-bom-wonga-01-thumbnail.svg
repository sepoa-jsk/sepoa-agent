<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" font-family="Pretendard, 'Noto Sans KR', sans-serif">
  <!-- DESIGN.md 2색 스킴: bg #0F172A + accent #0747A6, 밝은 텍스트로 대비 -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F172A"/>
      <stop offset="1" stop-color="#0B1220"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- 회로기판 모티프 (accent 저채도 라인+노드) -->
  <g stroke="#0747A6" stroke-width="2" fill="none" opacity="0.22">
    <path d="M0 140 H210 V60"/>
    <path d="M120 720 V560 H320"/>
    <path d="M1280 200 H1080 V120"/>
    <path d="M1160 720 V600 H980"/>
    <path d="M0 400 H90"/>
    <path d="M1280 460 H1190"/>
  </g>
  <g fill="#0747A6" opacity="0.35">
    <circle cx="210" cy="60" r="6"/><circle cx="320" cy="560" r="6"/>
    <circle cx="1080" cy="120" r="6"/><circle cx="980" cy="600" r="6"/>
    <circle cx="90" cy="400" r="5"/><circle cx="1190" cy="460" r="5"/>
  </g>

  <!-- 상단 헤드라인 -->
  <text x="640" y="120" text-anchor="middle" fill="#F8FAFC" font-size="52" font-weight="800">다단계 BOM 원가, 안전하십니까?</text>
  <rect x="500" y="150" width="280" height="5" rx="2.5" fill="#0747A6"/>

  <!-- 중앙 구분선 (As-Is | To-Be) -->
  <line x1="640" y1="220" x2="640" y2="640" stroke="#0747A6" stroke-width="2" stroke-dasharray="6 10" opacity="0.6"/>

  <!-- 좌: As-Is (흐트러진 표 + 상승 화살표) -->
  <text x="330" y="270" text-anchor="middle" fill="#94A3B8" font-size="26" font-weight="700" letter-spacing="4">AS-IS</text>
  <g transform="translate(230,320)" stroke="#93B4E6" stroke-width="3" fill="none" opacity="0.85">
    <rect x="0" y="0" width="200" height="130" rx="8"/>
    <line x1="0" y1="42" x2="200" y2="42"/><line x1="0" y1="84" x2="200" y2="84"/>
    <line x1="66" y1="0" x2="66" y2="130"/><line x1="133" y1="0" x2="133" y2="130"/>
  </g>
  <path d="M470 430 L520 350 L505 360 M520 350 L520 372" transform="translate(-40,0)" stroke="#0747A6" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="330" y="520" text-anchor="middle" fill="#E2E8F0" font-size="30" font-weight="700">시세는 매일,</text>
  <text x="330" y="560" text-anchor="middle" fill="#E2E8F0" font-size="30" font-weight="700">원가표는 어제 그대로</text>

  <!-- 우: To-Be (정돈된 BOM 트리) -->
  <text x="950" y="270" text-anchor="middle" fill="#7FA8E6" font-size="26" font-weight="700" letter-spacing="4">TO-BE</text>
  <g stroke="#0747A6" stroke-width="3" fill="none">
    <path d="M950 330 V360 M820 400 H1080 M820 400 V430 M950 400 V430 M1080 400 V430"/>
  </g>
  <g>
    <rect x="905" y="300" width="90" height="34" rx="8" fill="#0747A6"/>
    <rect x="780" y="430" width="80" height="30" rx="7" fill="none" stroke="#0747A6" stroke-width="3"/>
    <rect x="910" y="430" width="80" height="30" rx="7" fill="none" stroke="#0747A6" stroke-width="3"/>
    <rect x="1040" y="430" width="80" height="30" rx="7" fill="none" stroke="#0747A6" stroke-width="3"/>
  </g>
  <text x="950" y="530" text-anchor="middle" fill="#F8FAFC" font-size="30" font-weight="800">BOM 전체를 꿰뚫는</text>
  <text x="950" y="570" text-anchor="middle" fill="#F8FAFC" font-size="30" font-weight="800">원가 관리</text>

  <!-- 브랜드 -->
  <text x="640" y="690" text-anchor="middle" fill="#64748B" font-size="22" font-weight="600" letter-spacing="2">세포아소프트 · SingleSuite</text>
</svg>
