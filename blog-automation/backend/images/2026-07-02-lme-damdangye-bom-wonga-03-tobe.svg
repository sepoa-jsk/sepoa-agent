<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" font-family="Pretendard, 'Noto Sans KR', sans-serif">
  <rect width="1280" height="720" fill="#0F172A"/>

  <!-- 회로기판 모티프 -->
  <g stroke="#0747A6" stroke-width="2" fill="none" opacity="0.2">
    <path d="M0 100 H140 V40"/><path d="M1280 110 H1140 V50"/>
    <path d="M80 720 V630 H260"/><path d="M1200 720 V650 H1020"/>
  </g>
  <g fill="#0747A6" opacity="0.32">
    <circle cx="140" cy="40" r="5"/><circle cx="1140" cy="50" r="5"/>
    <circle cx="260" cy="630" r="5"/><circle cx="1020" cy="650" r="5"/>
  </g>

  <!-- 제목 -->
  <text x="640" y="130" text-anchor="middle" fill="#F8FAFC" font-size="48" font-weight="800">BOM 전체를 꿰뚫는 원가 관리</text>
  <rect x="510" y="158" width="260" height="5" rx="2.5" fill="#0747A6"/>

  <!-- 3노드 연결 (회로 트레이스) -->
  <g stroke="#0747A6" stroke-width="4" fill="none">
    <line x1="360" y1="360" x2="500" y2="360"/>
    <line x1="780" y1="360" x2="920" y2="360"/>
  </g>
  <!-- 화살표 -->
  <g fill="#0747A6">
    <path d="M500 360 l-16 -9 v18 z"/>
    <path d="M920 360 l-16 -9 v18 z"/>
  </g>

  <!-- 노드1 -->
  <g transform="translate(210,290)">
    <rect x="0" y="0" width="150" height="140" rx="16" fill="#0747A6"/>
    <g transform="translate(75,48)" stroke="#F8FAFC" stroke-width="4" fill="none" stroke-linecap="round">
      <path d="M-24 6 h48 M-24 -6 h48"/><circle cx="-10" cy="-6" r="6" fill="#0747A6"/><circle cx="12" cy="6" r="6" fill="#0747A6"/>
    </g>
    <text x="75" y="105" text-anchor="middle" fill="#F8FAFC" font-size="21" font-weight="700">단가·시세</text>
    <text x="75" y="128" text-anchor="middle" fill="#F8FAFC" font-size="21" font-weight="700">연동</text>
  </g>

  <!-- 노드2 -->
  <g transform="translate(565,290)">
    <rect x="0" y="0" width="215" height="140" rx="16" fill="#0B1220" stroke="#0747A6" stroke-width="3"/>
    <g transform="translate(107,46)" stroke="#0747A6" stroke-width="4" fill="none" stroke-linecap="round">
      <circle cx="0" cy="-16" r="9"/><path d="M0 -7 V6 M0 6 L-34 24 M0 6 L0 24 M0 6 L34 24"/>
      <circle cx="-34" cy="30" r="6"/><circle cx="0" cy="30" r="6"/><circle cx="34" cy="30" r="6"/>
    </g>
    <text x="107" y="105" text-anchor="middle" fill="#F1F5F9" font-size="21" font-weight="700">다단계 BOM</text>
    <text x="107" y="128" text-anchor="middle" fill="#F1F5F9" font-size="21" font-weight="700">원가 전개</text>
  </g>

  <!-- 노드3 -->
  <g transform="translate(920,290)">
    <rect x="0" y="0" width="215" height="140" rx="16" fill="#0B1220" stroke="#0747A6" stroke-width="3"/>
    <g transform="translate(107,46)" stroke="#0747A6" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M-22 20 h44"/><path d="M-14 20 v-20 h28 v20"/><path d="M-14 6 h28"/>
      <circle cx="20" cy="-16" r="7" fill="#0747A6"/>
    </g>
    <text x="107" y="105" text-anchor="middle" fill="#F1F5F9" font-size="21" font-weight="700">목표원가</text>
    <text x="107" y="128" text-anchor="middle" fill="#F1F5F9" font-size="21" font-weight="700">모니터링·알림</text>
  </g>

  <!-- 하단 결론 + 브랜드 -->
  <text x="640" y="540" text-anchor="middle" fill="#93B4E6" font-size="26" font-weight="600">이탈이 시작되는 지점에서 신호를 보냅니다</text>
  <g transform="translate(640,610)">
    <rect x="-150" y="-34" width="300" height="62" rx="31" fill="none" stroke="#0747A6" stroke-width="2"/>
    <text x="0" y="8" text-anchor="middle" fill="#F8FAFC" font-size="34" font-weight="800" letter-spacing="1">SingleSuite</text>
  </g>
</svg>
